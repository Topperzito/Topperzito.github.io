<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clima en Valencia</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      color: #333;
      text-align: center;
      padding: 20px;
    }
    h1 {
      color: #0056b3;
      margin-bottom: 3em;
    }
    #weather {
      font-size: 1.2em;
      margin: 20px 0;
    }
    form {
      margin-top: 20px;
    }
    label {
      font-weight: bold;
    }
    input[type="text"] {
      padding: 5px;
      font-size: 1em;
      margin-right: 10px;
    }
    button {
      padding: 5px 10px;
      font-size: 1em;
      background-color: #0056b3;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background-color: #003d80;
    }
  </style>
</head>
<body> 
  <h1 id="titulo">Clima actual</h1>
  <p id="weather">Cargando...</p>

  <form action="#" method="get">
    <label for="city">Ciudad:</label>
    <input type="text" id="city" name="city" value="Valencia">
    <button type="button" id="boton">Actualizar</button>
  </form>

  <script>
    // Pon aqui tu clave de la API
    const apiKey = 'TU_API_KEY';
    let titulo = document.getElementById('titulo');
    let boton = document.getElementById('boton'); 
    let inputCiudad = document.getElementById('city');
    let weatherElement = document.getElementById('weather');

    boton.addEventListener('click', function(event) {
      event.preventDefault(); 
      obtenerClima();
    });

    inputCiudad.addEventListener('keydown', function(event) {
      if (event.key === 'Enter') {
        event.preventDefault(); 
        obtenerClima(); 
      }
    });

    function obtenerClima() {
      const ciudad = inputCiudad.value;
      const url = `https://api.openweathermap.org/data/2.5/weather?q=${ciudad}&lang=es&units=metric&appid=${apiKey}`;
      titulo.innerHTML = "Clima actual " + ciudad;
      
      fetch(url)
        .then(response => {
          if (!response.ok) {
            throw new Error('Error al obtener los datos del clima: ' + response.statusText);
          }
          return response.json();
        })
        .then((data) => {
          const temperature = data.main.temp;
          const description = data.weather[0].description;
          const humidity = data.main.humidity;

          // Mostramos los datos en el HTML
          /* ACABALO */
          weatherElement.innerHTML = `
            La temperatura es de <b>${temperature} grados</b>.<br>
            El cielo esta: <b>${description}</b>.<br>
            La humedad es del <b>${humidity}%</b>.
          `;
          /* FIN ACABALO */        
        })
        .catch(error => {
          console.error('Hubo un problema:', error);
          weatherElement.textContent = "No se pudo obtener el clima de esa ciudad.";
        });
    }
    
    obtenerClima();
  </script>
</body>
</html>
